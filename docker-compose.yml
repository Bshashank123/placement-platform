version: '3.8'

services:
  # ---------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: placement-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: placement_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ---------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: placement-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/placement_db
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - db

  # ---------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: placement-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_data:
